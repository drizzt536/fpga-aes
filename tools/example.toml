# example TOML program for `./crc-gen.py`

in-port  = "inp"
out-port = "outp"
tmp-name = "net"
data-len = 32

[curve]
polynomial = 0x17b
# name = "crc32" # mutually exclusive of the rest of the curve parameters

init    = 45    # default is 0
xor-out = 5     # default is 0
reflect = false # default is false
